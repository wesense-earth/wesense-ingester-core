name: Run Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  # After tests pass, trigger ingester rebuilds (main and dev)
  trigger-ingester-builds:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        repo:
          - wesense-ingester-meshtastic
          - wesense-ingester-wesense
          - wesense-ingester-homeassistant
          - wesense-ingester-govaq-nz
          - wesense-live-transport
          - wesense-storage-broker
          - wesense-zenoh-api

    steps:
      - name: Trigger rebuild of ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.CORE_DISPATCH_TOKEN }}
        run: |
          # Use workflow_dispatch (not repository_dispatch) so we can target
          # the matching branch. repository_dispatch always runs on main.
          gh workflow run docker-build.yml \
            --repo wesense-earth/${{ matrix.repo }} \
            --ref ${{ github.ref_name }}
