syntax = "proto3";
package wesense.p2p;

message SignedReading {
  bytes payload = 1;
  bytes signature = 2;
  string ingester_id = 3;
  uint32 key_version = 4;
  // Ed25519 public key (raw 32 bytes) used for signing.
  // Included in the envelope so P2P-received readings are self-verifying
  // without requiring a live trust store lookup. See governance-and-trust.md.
  bytes public_key = 5;
}
